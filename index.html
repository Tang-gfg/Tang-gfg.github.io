<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">我的网站</div>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>欢迎来到我的网站</h1>
            <p>这是一个用 VS Code 创建的漂亮网站</p>
            <button onclick="showMessage()">点击我</button>
        </section>

        <section id="about" class="about">
            <h2>关于我们</h2>
            <p>这是一个示例网站，你可以根据需要修改内容。</p>
        </section>

        <section id="services" class="services">
            <h2>我们的服务</h2>
            <div class="cards">
                <div class="card">
                    <h3>Web开发</h3>
                    <p>专业的网站开发服务</p>
                </div>
                <div class="card">
                    <h3>设计</h3>
                    <p>精美的界面设计</p>
                </div>
                <div class="card">
                    <h3>咨询</h3>
                    <p>专业的技术咨询</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 我的网站 | 保留所有权利</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
